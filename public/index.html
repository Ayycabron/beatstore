<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap" rel="stylesheet">
    <title>THÉO HAMEL - Beatstore</title>
    <style>
        body {
            margin: 0;
            font-family: 'Space Mono', monospace;
            background-color: #0B0A12;
            color: white;
        }
        nav {
            position: fixed;
            width: 100%;
            background-color: rgba(124, 62, 237, 0.9);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h1 {
            font-family: 'Bebas Neue', sans-serif;
            margin: 0;
        }
        section.hero {
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: url('hero-background.jpg') center/cover;
        }
        .beats {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
        }
    </style>
</head>
<body>
    <nav>
        <h1>THÉO HAMEL</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#beats">Beats</a></li>
            <li><a href="#licences">Licenses</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h2>Welcome to the Beatstore</h2>
    </section>

    <section class="beats" id="beats"></section>

    <script>
        fetch('beats.json')
            .then(response => response.json())
            .then(data => {
                const beatsSection = document.getElementById('beats');
                data.forEach(beat => {
                    const beatDiv = document.createElement('div');
                    beatDiv.innerHTML = `<h3>${beat.name}</h3><p>${beat.bpm} - ${beat.genre} - €${beat.price}</p>`;
                    beatsSection.appendChild(beatDiv);
                });
            });
    </script>
</body>
</html>
